name: Release p0 CLI

on:
  push:
    tags:
      - "p0-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CLI_PACKAGE: p0-cli
  CLI_BINARY: p0

jobs:
  build-and-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: p0
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_name: p0
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: p0
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: p0.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Set release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#p0-v}"
          else
            VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' p0-cli/Cargo.toml | head -n1)"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "ARCHIVE_BASENAME=p0-${VERSION}-${{ matrix.target }}" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-build-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            cargo-build-${{ runner.os }}-${{ matrix.target }}-

      - name: Build CLI
        run: cargo build --release --locked -p ${{ env.CLI_PACKAGE }} --target ${{ matrix.target }}

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ env.CLI_BINARY }}" "dist/${{ env.CLI_BINARY }}"
          cp "p0-cli/README.md" "dist/README.md"
          tar -C dist -czf "${ARCHIVE_BASENAME}.${{ matrix.archive_ext }}" "${{ env.CLI_BINARY }}" README.md
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE_BASENAME}.${{ matrix.archive_ext }}" > "${ARCHIVE_BASENAME}.${{ matrix.archive_ext }}.sha256"
          else
            shasum -a 256 "${ARCHIVE_BASENAME}.${{ matrix.archive_ext }}" > "${ARCHIVE_BASENAME}.${{ matrix.archive_ext }}.sha256"
          fi

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Copy-Item "p0-cli/README.md" "dist/README.md"
          Compress-Archive -Path "dist/*" -DestinationPath "${env:ARCHIVE_BASENAME}.${{ matrix.archive_ext }}" -Force
          $hash = (Get-FileHash "${env:ARCHIVE_BASENAME}.${{ matrix.archive_ext }}" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "${env:ARCHIVE_BASENAME}.${{ matrix.archive_ext }}.sha256" -Value "$hash  ${env:ARCHIVE_BASENAME}.${{ matrix.archive_ext }}"

      - name: Upload release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE_BASENAME }}.${{ matrix.archive_ext }}
            ${{ env.ARCHIVE_BASENAME }}.${{ matrix.archive_ext }}.sha256
          generate_release_notes: true

      - name: Upload build artifact (non-release)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: p0-${{ matrix.target }}
          path: ${{ env.ARCHIVE_BASENAME }}.${{ matrix.archive_ext }}
